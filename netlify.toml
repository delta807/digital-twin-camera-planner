[build]
  command = "npm run build"
  publish = "dist"

# Serverless functions (team layout sync via Netlify Blobs). Active on deploy / `netlify dev`.
[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdn.tailwindcss.com https://esm.sh https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https: http://100.68.215.10:8088; connect-src 'self' https://generativelanguage.googleapis.com https://raw.githubusercontent.com https://unpkg.com https://esm.sh; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

[[redirects]]
  from = "/assets/index-qzWeh8d7.js"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
