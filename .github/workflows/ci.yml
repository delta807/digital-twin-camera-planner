name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install (clean, lockfile-faithful)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Smoke test (Playwright)
        run: npm run test:smoke

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install (clean, lockfile-faithful)
        run: npm ci

      # Fail only on HIGH/CRITICAL vulnerabilities in PRODUCTION dependencies (what actually ships).
      # The dev toolchain (vite/vitest/esbuild) carries known low-severity dev-server advisories that
      # don't affect the deployed bundle, so they must not block CI.
      - name: Security audit (production deps)
        run: npm audit --omit=dev --audit-level=high
